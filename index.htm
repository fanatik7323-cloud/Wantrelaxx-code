<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2FA Authenticator code </title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #000000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .title {
            color: white;
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }

        .codes-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .code-card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 20px rgba(255, 255, 255, 0.3),
                            0 0 40px rgba(255, 255, 255, 0.1);
            }
            50% {
                box-shadow: 0 0 40px rgba(255, 255, 255, 0.6),
                            0 0 60px rgba(255, 255, 255, 0.3);
            }
        }

        .code-card:hover {
            transform: translateY(-5px);
            animation: pulse 1.5s ease-in-out infinite;
        }

        .account-label {
            color: #667eea;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .code-display {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: 8px;
            color: #333;
            font-family: 'Courier New', monospace;
            margin-bottom: 15px;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
            transition: width 0.1s linear;
        }

        .countdown {
            color: #999;
            font-size: 12px;
            margin-bottom: 15px;
        }

        .button-container {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn-copy {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-copy:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(102, 126, 234, 0.5);
        }

        .btn-copy:active {
            transform: scale(0.95);
        }

        .bottom-cards-wrapper {
            grid-column: 2 / 4;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .bottom-card {
            flex: 1;
            max-width: 250px;
        }

        @media (max-width: 1024px) {
            .codes-grid {
                grid-template-columns: repeat(3, 1fr);
            }

            .bottom-cards-wrapper {
                grid-column: 1 / -1;
            }
        }

        @media (max-width: 768px) {
            .codes-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .title {
                font-size: 24px;
            }

            .bottom-cards-wrapper {
                grid-column: 1 / -1;
                flex-direction: column;
            }

            .bottom-card {
                max-width: 100%;
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            .codes-grid {
                grid-template-columns: 1fr;
            }

            .code-display {
                font-size: 28px;
                letter-spacing: 4px;
            }

            .bottom-cards-wrapper {
                grid-column: 1 / -1;
                flex-direction: column;
            }

            .bottom-card {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">2FA Коды</h1>
            <p class="subtitle">Ваши коды аутентификации</p>
        </div>

        <div class="codes-grid" id="codesGrid">
            <!-- Карточки будут сгенерированы JS -->
        </div>
    </div>

    <script>
        const ACCOUNTS = 6;
        
        // ===== ВСТАВЬТЕ ВАШИ BASE32 КЛЮЧИ (32 символа) =====
        const SECRETS = {
            1: 'AVHHL4E7S7ALPW4CNJB45JKHC4SN5A5S',
            2: 'EUDZP7RXWOGAWFGYSKQF4GGLZY4223LW',
            3: '67DM4JVYAKFCQ5KKBQYKZHKDA4RL3CT5',
            4: 'AKHG5MROAN3KPEJAJNM5Q74H7ZG6YHY2',
            5: '4Z3LWRLMOY5LZ7JD6NHUKTLAEIL4SKGT',
            6: 'EIPQAEPY62TXBRVZONH5HJYI3XSIZ3RH'
        };

        // ===== SHA1 встроенная функция (не требует CDN) =====
        function sha1(str) {
            function rotate_left(n, b) {
                return ((n << b) | (n >> (32 - b)));
            }

            function cvt_hex(val) {
                var str = "";
                var i;
                var v;

                for (i = 7; i >= 0; i--) {
                    v = (val >>> (i * 4)) & 0x0f;
                    str += v.toString(16);
                }
                return str;
            }

            var blockstart;
            var i, j;
            var W = new Array(80);
            var H0 = 0x67452301;
            var H1 = 0xEFCDAB89;
            var H2 = 0x98BADCFE;
            var H3 = 0x10325476;
            var H4 = 0xC3D2E1F0;
            var A, B, C, D, E, temp;

            str = unescape(encodeURIComponent(str));
            var strLen = str.length;

            var wordArray = [];
            for (i = 0; i < strLen - 3; i += 4) {
                j = str.charCodeAt(i) << 24 | str.charCodeAt(i + 1) << 16 |
                    str.charCodeAt(i + 2) << 8 | str.charCodeAt(i + 3);
                wordArray.push(j);
            }

            switch (strLen % 4) {
                case 0:
                    i = 0x080000000;
                    break;
                case 1:
                    i = str.charCodeAt(strLen - 1) << 24 | 0x0800000;
                    break;
                case 2:
                    i = str.charCodeAt(strLen - 2) << 24 | str.charCodeAt(strLen - 1) << 16 | 0x08000;
                    break;
                case 3:
                    i = str.charCodeAt(strLen - 3) << 24 | str.charCodeAt(strLen - 2) << 16 | str.charCodeAt(strLen - 1) << 8 | 0x80;
                    break;
            }

            wordArray.push(i);

            while ((wordArray.length % 16) != 0) {
                wordArray.push(0);
            }

            wordArray.push(strLen >>> 29);
            wordArray.push((strLen << 3) & 0x0ffffffff);

            for (blockstart = 0; blockstart < wordArray.length; blockstart += 16) {
                for (i = 0; i < 16; i++) {
                    W[i] = wordArray[blockstart + i];
                }
                for (i = 16; i <= 79; i++) {
                    W[i] = rotate_left(W[i - 3] ^ W[i - 8] ^ W[i - 14] ^ W[i - 16], 1);
                }

                A = H0;
                B = H1;
                C = H2;
                D = H3;
                E = H4;

                for (i = 0; i <= 19; i++) {
                    temp = (rotate_left(A, 5) + ((B & C) | (~B & D)) + E + W[i] + 0x5A827999) & 0x0ffffffff;
                    E = D;
                    D = C;
                    C = rotate_left(B, 30);
                    B = A;
                    A = temp;
                }

                for (i = 20; i <= 39; i++) {
                    temp = (rotate_left(A, 5) + (B ^ C ^ D) + E + W[i] + 0x6ED9EBA1) & 0x0ffffffff;
                    E = D;
                    D = C;
                    C = rotate_left(B, 30);
                    B = A;
                    A = temp;
                }

                for (i = 40; i <= 59; i++) {
                    temp = (rotate_left(A, 5) + ((B & C) | (B & D) | (C & D)) + E + W[i] + 0x8F1BBCDC) & 0x0ffffffff;
                    E = D;
                    D = C;
                    C = rotate_left(B, 30);
                    B = A;
                    A = temp;
                }

                for (i = 60; i <= 79; i++) {
                    temp = (rotate_left(A, 5) + (B ^ C ^ D) + E + W[i] + 0xCA62C1D6) & 0x0ffffffff;
                    E = D;
                    D = C;
                    C = rotate_left(B, 30);
                    B = A;
                    A = temp;
                }

                H0 = (H0 + A) & 0x0ffffffff;
                H1 = (H1 + B) & 0x0ffffffff;
                H2 = (H2 + C) & 0x0ffffffff;
                H3 = (H3 + D) & 0x0ffffffff;
                H4 = (H4 + E) & 0x0ffffffff;
            }

            var tempstr = cvt_hex(H0) + cvt_hex(H1) + cvt_hex(H2) + cvt_hex(H3) + cvt_hex(H4);

            return tempstr.toLowerCase();
        }

        // Base32 декодирование
        function base32Decode(base32String) {
            const base32Alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
            let bits = '';
            
            for (let i = 0; i < base32String.length; i++) {
                const val = base32Alphabet.indexOf(base32String[i].toUpperCase());
                if (val === -1) throw new Error('Invalid Base32 character: ' + base32String[i]);
                bits += val.toString(2).padStart(5, '0');
            }

            const bytes = [];
            for (let i = 0; i + 8 <= bits.length; i += 8) {
                bytes.push(parseInt(bits.substring(i, i + 8), 2));
            }
            return bytes;
        }

        // Преобразование hex-строки в байты
        function hexToBytes(hexStr) {
            const bytes = [];
            for (let i = 0; i < hexStr.length; i += 2) {
                bytes.push(parseInt(hexStr.substr(i, 2), 16));
            }
            return bytes;
        }

        // Преобразование строки в байты
        function stringToBytes(str) {
            const bytes = [];
            for (let i = 0; i < str.length; i++) {
                bytes.push(str.charCodeAt(i) & 0xff);
            }
            return bytes;
        }

        // HMAC-SHA1 (исправленная версия)
        function hmacSha1(key, message) {
            const blockSize = 64;
            let keyBytes = key;

            if (keyBytes.length > blockSize) {
                keyBytes = hexToBytes(sha1(String.fromCharCode.apply(null, keyBytes)));
            }

            const paddedKey = new Array(blockSize).fill(0);
            for (let i = 0; i < keyBytes.length; i++) {
                paddedKey[i] = keyBytes[i];
            }

            const opad = paddedKey.map(b => b ^ 0x5c);
            const ipad = paddedKey.map(b => b ^ 0x36);

            const ipadMsg = String.fromCharCode.apply(null, ipad) + String.fromCharCode.apply(null, message);
            const innerHash = sha1(ipadMsg);
            const innerHashBytes = hexToBytes(innerHash);

            const opadMsg = String.fromCharCode.apply(null, opad) + String.fromCharCode.apply(null, innerHashBytes);
            const result = sha1(opadMsg);
            return result;
        }

        // TOTP генератор (исправленная версия)
        function generateTOTP(secret, time = null) {
            if (!secret) return '------';

            try {
                time = time || Math.floor(Date.now() / 1000);
                const timeCounter = Math.floor(time / 30);

                const key = base32Decode(secret);
                
                // Создаем 8-байтовое сообщение с counter
                const msg = new Uint8Array(8);
                let counter = timeCounter;
                msg[0] = (counter >>> 56) & 0xff;
                msg[1] = (counter >>> 48) & 0xff;
                msg[2] = (counter >>> 40) & 0xff;
                msg[3] = (counter >>> 32) & 0xff;
                msg[4] = (counter >>> 24) & 0xff;
                msg[5] = (counter >>> 16) & 0xff;
                msg[6] = (counter >>> 8) & 0xff;
                msg[7] = counter & 0xff;

                const hmacHex = hmacSha1(key, Array.from(msg));
                const hmacBytes = hexToBytes(hmacHex);

                const offset = hmacBytes[hmacBytes.length - 1] & 0x0f;
                const code = ((hmacBytes[offset] & 0x7f) << 24)
                    | ((hmacBytes[offset + 1] & 0xff) << 16)
                    | ((hmacBytes[offset + 2] & 0xff) << 8)
                    | (hmacBytes[offset + 3] & 0xff);

                return (code % 1000000).toString().padStart(6, '0');
            } catch (e) {
                console.error('TOTP error:', e);
                return 'Ошибка';
            }
        }

        // Инициализация сетки
        function initializeGrid() {
            const grid = document.getElementById('codesGrid');
            grid.innerHTML = '';

            for (let i = 1; i <= ACCOUNTS; i++) {
                const card = document.createElement('div');
                card.className = i > 4 ? 'code-card bottom-card' : 'code-card';
                card.id = `card-${i}`;
                card.innerHTML = `
                    <div class="account-label">Аккаунт ${i}</div>
                    <div class="code-display" id="code-${i}">------</div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-${i}" style="width: 100%"></div>
                    </div>
                    <div class="countdown" id="countdown-${i}">Загрузка...</div>
                    <div class="button-container">
                        <button class="btn-copy" id="copy-${i}" data-account="${i}">📋 Копировать</button>
                    </div>
                `;
                grid.appendChild(card);

                document.getElementById(`copy-${i}`).addEventListener('click', () => copyCode(i));
            }
        }

        // Обновление кодов
        function updateCodes() {
            const now = Math.floor(Date.now() / 1000);
            const timeInPeriod = now % 30;
            const progress = ((30 - timeInPeriod) / 30) * 100;

            for (let i = 1; i <= ACCOUNTS; i++) {
                const code = generateTOTP(SECRETS[i], now);
                document.getElementById(`code-${i}`).textContent = code;
                document.getElementById(`progress-${i}`).style.width = progress + '%';
                document.getElementById(`countdown-${i}`).textContent = `Обновление через ${30 - timeInPeriod}с`;
            }
        }

        // Копирование кода
        function copyCode(accountNumber) {
            const code = document.getElementById(`code-${accountNumber}`).textContent;
            if (code === '------' || code === 'Ошибка') return;

            navigator.clipboard.writeText(code).then(() => {
                const btn = document.getElementById(`copy-${accountNumber}`);
                const originalText = btn.textContent;
                btn.textContent = '✓ Скопировано!';
                setTimeout(() => {
                    btn.textContent = originalText;
                }, 2000);
            });
        }

        // Переорганизация карточек
        function reorganizeCards() {
            const grid = document.getElementById('codesGrid');
            const card5 = document.getElementById('card-5');
            const card6 = document.getElementById('card-6');

            if (card5 && card6) {
                const wrapper = document.createElement('div');
                wrapper.className = 'bottom-cards-wrapper';
                grid.appendChild(wrapper);
                wrapper.appendChild(card5);
                wrapper.appendChild(card6);
            }
        }

        // Инициализация
        function init() {
            console.log('Initializing 2FA...');
            initializeGrid();
            reorganizeCards();
            updateCodes();
            console.log('2FA ready');
            setInterval(updateCodes, 1000);
        }

        // Запуск после загрузки DOM
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
