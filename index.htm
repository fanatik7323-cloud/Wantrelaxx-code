<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2FA Authenticator code </title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #000000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .title {
            color: white;
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }

        .codes-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .code-card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 20px rgba(255, 255, 255, 0.3),
                            0 0 40px rgba(255, 255, 255, 0.1);
            }
            50% {
                box-shadow: 0 0 40px rgba(255, 255, 255, 0.6),
                            0 0 60px rgba(255, 255, 255, 0.3);
            }
        }

        .code-card:hover {
            transform: translateY(-5px);
            animation: pulse 1.5s ease-in-out infinite;
        }

        .account-label {
            color: #667eea;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .code-display {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: 8px;
            color: #333;
            font-family: 'Courier New', monospace;
            margin-bottom: 15px;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
            transition: width 0.1s linear;
        }

        .countdown {
            color: #999;
            font-size: 12px;
            margin-bottom: 15px;
        }

        .button-container {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn-copy {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-copy:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(102, 126, 234, 0.5);
        }

        .btn-copy:active {
            transform: scale(0.95);
        }

        .bottom-cards-wrapper {
            grid-column: 2 / 4;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .bottom-card {
            flex: 1;
            max-width: 250px;
        }

        @media (max-width: 1024px) {
            .codes-grid {
                grid-template-columns: repeat(3, 1fr);
            }

            .bottom-cards-wrapper {
                grid-column: 1 / -1;
            }
        }

        @media (max-width: 768px) {
            .codes-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .title {
                font-size: 24px;
            }

            .bottom-cards-wrapper {
                grid-column: 1 / -1;
                flex-direction: column;
            }

            .bottom-card {
                max-width: 100%;
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            .codes-grid {
                grid-template-columns: 1fr;
            }

            .code-display {
                font-size: 28px;
                letter-spacing: 4px;
            }

            .bottom-cards-wrapper {
                grid-column: 1 / -1;
                flex-direction: column;
            }

            .bottom-card {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">2FA Коды</h1>
            <p class="subtitle">Ваши коды аутентификации</p>
        </div>

        <div class="codes-grid" id="codesGrid">
            <!-- Карточки будут сгенерированы JS -->
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.0/crypto-js.min.js"></script>
    <script>
        const ACCOUNTS = 6;
        
        // ===== ВСТАВЬТЕ ВАШИ BASE32 КЛЮЧИ =====
        const SECRETS = {
            1: 'AVHHL4E7S7ALPW4CNJB45JKHC4SN5A5S',
            2: 'EUDZP7RXWOGAWFGYSKQF4GGLZY4223LW',
            3: '67DM4JVYAKFCQ5KKBQYKZHKDA4RL3CT5',
            4: 'AKHG5MROAN3KPEJAJNM5Q74H7ZG6YHY2',
            5: '4Z3LWRLMOY5LZ7JD6NHUKTLAEIL4SKGT',
            6: 'EIPQAEPY62TXBRVZONH5HJYI3XSIZ3RH'
        };

        // Base32 декодирование (правильная реализация)
        function base32Decode(base32String) {
            const base32Alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
            let bits = '';
            let value;
            
            for (let i = 0; i < base32String.length; i++) {
                value = base32Alphabet.indexOf(base32String[i].toUpperCase());
                if (value === -1) throw new Error('Invalid Base32 character: ' + base32String[i]);
                bits += value.toString(2).padStart(5, '0');
            }

            const bytes = [];
            for (let i = 0; i + 8 <= bits.length; i += 8) {
                bytes.push(parseInt(bits.substring(i, i + 8), 2));
            }
            
            return bytes;
        }

        // TOTP генератор с использованием CryptoJS
        function generateTOTP(secret, time = null) {
            if (!secret) return '------';

            try {
                time = time || Math.floor(Date.now() / 1000);
                const timeCounter = Math.floor(time / 30);

                // Декодируем BASE32 ключ
                const key = base32Decode(secret);
                
                // Создаем 8-байтовое сообщение с counter (big-endian)
                const msg = new Uint8Array(8);
                for (let i = 0; i < 8; i++) {
                    msg[7 - i] = timeCounter & 0xff;
                    timeCounter = timeCounter >> 8;
                }

                // Преобразуем в WordArray для CryptoJS
                const keyWordArray = CryptoJS.enc.Latin1.parse(String.fromCharCode.apply(null, key));
                const msgWordArray = CryptoJS.enc.Latin1.parse(String.fromCharCode.apply(null, msg));

                // Вычисляем HMAC-SHA1
                const hmac = CryptoJS.HmacSHA1(msgWordArray, keyWordArray);
                const hmacHex = hmac.toString();
                
                // Извлекаем динамический код
                const offset = parseInt(hmacHex.substring(hmacHex.length - 1), 16) & 0x0f;
                const offsetInBytes = offset * 2;
                
                const code = parseInt(hmacHex.substring(offsetInBytes, offsetInBytes + 8), 16) & 0x7fffffff;
                
                return (code % 1000000).toString().padStart(6, '0');
            } catch (e) {
                console.error('TOTP error:', e);
                return 'Ошибка';
            }
        }

        // Инициализация сетки
        function initializeGrid() {
            const grid = document.getElementById('codesGrid');
            grid.innerHTML = '';

            for (let i = 1; i <= ACCOUNTS; i++) {
                const card = document.createElement('div');
                card.className = i > 4 ? 'code-card bottom-card' : 'code-card';
                card.id = `card-${i}`;
                card.innerHTML = `
                    <div class="account-label">Аккаунт ${i}</div>
                    <div class="code-display" id="code-${i}">------</div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-${i}" style="width: 100%"></div>
                    </div>
                    <div class="countdown" id="countdown-${i}">Загрузка...</div>
                    <div class="button-container">
                        <button class="btn-copy" id="copy-${i}" data-account="${i}">📋 Копировать</button>
                    </div>
                `;
                grid.appendChild(card);

                document.getElementById(`copy-${i}`).addEventListener('click', () => copyCode(i));
            }
        }

        // Обновление кодов
        function updateCodes() {
            const now = Math.floor(Date.now() / 1000);
            const timeInPeriod = now % 30;
            const progress = ((30 - timeInPeriod) / 30) * 100;

            for (let i = 1; i <= ACCOUNTS; i++) {
                const code = generateTOTP(SECRETS[i], now);
                document.getElementById(`code-${i}`).textContent = code;
                document.getElementById(`progress-${i}`).style.width = progress + '%';
                document.getElementById(`countdown-${i}`).textContent = `Обновление через ${30 - timeInPeriod}с`;
            }
        }

        // Копирование кода
        function copyCode(accountNumber) {
            const code = document.getElementById(`code-${accountNumber}`).textContent;
            if (code === '------' || code === 'Ошибка') return;

            navigator.clipboard.writeText(code).then(() => {
                const btn = document.getElementById(`copy-${accountNumber}`);
                const originalText = btn.textContent;
                btn.textContent = '✓ Скопировано!';
                setTimeout(() => {
                    btn.textContent = originalText;
                }, 2000);
            });
        }

        // Переорганизация карточек
        function reorganizeCards() {
            const grid = document.getElementById('codesGrid');
            const card5 = document.getElementById('card-5');
            const card6 = document.getElementById('card-6');

            if (card5 && card6) {
                const wrapper = document.createElement('div');
                wrapper.className = 'bottom-cards-wrapper';
                grid.appendChild(wrapper);
                wrapper.appendChild(card5);
                wrapper.appendChild(card6);
            }
        }

        // Инициализация
        function init() {
            console.log('Initializing 2FA...');
            initializeGrid();
            reorganizeCards();
            updateCodes();
            console.log('2FA ready');
            setInterval(updateCodes, 1000);
        }

        // Запуск после загрузки DOM
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
